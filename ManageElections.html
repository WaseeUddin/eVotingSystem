<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Elections</title>
<link rel="stylesheet" href="ManageElections.css">
<script src="https://kit.fontawesome.com/cbcb94e751.js" crossorigin="anonymous"></script>
</head>

<body>

<header>
  <div class="brand">
    <div class="logo">
      <i class="fa-solid fa-check"></i>
    </div>
    <span>E-Voting System</span>
  </div>

  <nav>
    <a href="AdminDashBoard.html" class="dashboard-link">Dashboard</a>
    <a href="ManageElections.html" class="elections-link active">Elections</a>
    <a href="Live_Result_Counting.html" class="results-link">Results</a>
    <a href="Anomaly_Detection_andRepoting.html" class="anomalies-link">Anomalies</a>
  </nav>

  <div class="actions">
    <button class="top-btn">
      <i class="fa-solid fa-shield-halved"></i>
      <span class="admin-name-text">Admin User</span>
      <span class="role">(Admin)</span>
    </button>

    <a href="backend/logout.php" class="top-btn logout-btn">
      <i class="fa-solid fa-arrow-right-from-bracket"></i>
      Logout
    </a>
  </div>
</header>

<main>
  <div class="top">
    <div>
      <h1>Manage Elections</h1>
      <p class="subtitle">Create, edit and delete elections from database.</p>
    </div>

    <button type="button" class="create-btn" id="showCreateForm">
      <i class="fa-solid fa-plus"></i>
      Create Election
    </button>
  </div>

  <section class="form-card" id="electionFormPanel" style="display:none;">
    <div class="form-head">
      <h2 id="formHeading">Create Election</h2>
      <button type="button" class="close-btn" id="closeElectionForm">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <form id="adminElectionForm">
      <input type="hidden" id="electionId">

      <label>Election Title *</label>
      <input type="text" id="electionTitle" placeholder="Enter election title">

      <label>Description *</label>
      <textarea id="electionDescription" placeholder="Enter election description"></textarea>

      <div class="row">
        <div>
          <label>Start Date & Time *</label>
          <input type="datetime-local" id="startDatetime">
        </div>

        <div>
          <label>End Date & Time *</label>
          <input type="datetime-local" id="endDatetime">
        </div>
      </div>

      <label>Election Type *</label>
      <select id="electionType">
        <option value="public">Public Election</option>
        <option value="private">Private Election</option>
      </select>

      <label>Select Candidates</label>
      <div class="candidate-list" id="candidateCheckboxList">
        <p>Loading candidates...</p>
      </div>

      <div class="form-actions">
        <button type="button" class="cancel-btn" id="cancelElectionForm">
          Cancel
        </button>

        <button type="submit" class="save-btn">
          <i class="fa-solid fa-save"></i>
          Save Election
        </button>
      </div>
    </form>
  </section>

  <section id="electionList">
    <div class="election-card">
      <p>Loading elections...</p>
    </div>
  </section>
</main>

<script src="js/adminHeader.js?v=100"></script>
<script src="js/manageElection.js?v=300"></script>
</body>
</html>
