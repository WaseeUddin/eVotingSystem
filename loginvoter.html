<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login to E-Voting</title>

<link rel="stylesheet" href="loginvoter.css">
<script src="https://kit.fontawesome.com/cbcb94e751.js" crossorigin="anonymous"></script>
</head>

<body>

<div class="page">

  <!-- Back -->
  <a href="index.html" class="back">
    <i class="fa-solid fa-arrow-left"></i>
    Back to Home
  </a>

  <!-- Header -->
  <div class="header">
    <div class="title-row">
      <div class="logo">
        <i class="fa-solid fa-square-check"></i>
      </div>
      <h1>Login to E-Voting</h1>
    </div>

    <p class="subtitle">
      Access your account to participate in elections
    </p>
  </div>

  <!-- Tabs -->
  <div class="tabs">

    <a href="loginvoter.html" class="tab active">
      <i class="fa-solid fa-users"></i>
      Voter
    </a>

    <a href="logincandidate.html" class="tab">
      <i class="fa-solid fa-square-check"></i>
      Candidate
    </a>

    <a href="loginadmin.html" class="tab">
      <i class="fa-solid fa-shield"></i>
      Admin
    </a>

  </div>

  <!-- Card -->
  <div class="card">

    <div class="card-head">
      <h2>Voter Login</h2>
      <p>Sign in to cast your vote</p>
    </div>

    <form class="form">

      <!-- Email -->
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="voter@example.com" required>

      <!-- Password -->
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="••••••••" required>

      <!-- Login Button -->
      <a href="VoterDashboard.html" class="login-btn">
        <i class="fa-solid fa-right-to-bracket"></i>
        Login as Voter
      </a>

      <!-- Divider -->
      <div class="divider">
        Don’t have an account?
        <a href="RegisVoter.html">Register here</a>
      </div>

    </form>

  </div>

</div>
<script src="js/login.js?v=1000"></script>
</body>
</html>
