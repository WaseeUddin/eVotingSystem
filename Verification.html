<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Verify Account</title>
<link rel="stylesheet" href="Verification.css" >
<script src="https://kit.fontawesome.com/cbcb94e751.js" crossorigin="anonymous"></script>
</head>

<body>

<div class="page">
  <a href="index.html" class="back">
  <i class="fa-solid fa-arrow-left"></i> Back to Home
</a>

  <div class="header">
    <div class="title-row">
      <div class="logo"><i class="fa-solid fa-square-check"></i></div>
      <h1>Register for E-Voting</h1>
    </div>
    <p class="subtitle">Create your account to participate in democratic elections</p>
  </div>

  <div class="card">
    <div class="card-head">
      <h2>Verify Your Account</h2>
      <p>Enter the 6-digit code sent to your email</p>
    </div>

    <div class="form">
      <div class="email-box">
        <span><i class="fa-regular fa-envelope"></i></span>
        <span>Code sent to: xyz@gmail.com</span>
      </div>

      <label>Verification Code *</label>
      <input type="text" placeholder="Enter 6-digit code" maxlength="6">

      <button class="verify-btn"><i class="fa-regular fa-badge-check"></i> Verify & Complete Registration</button>

      <p class="resend">Didn't receive the code? <a href="#">Resend</a></p>

      <p class="back-form">
        <a href="RegisVoter.html"><i class="fa-solid fa-arrow-left"></i> Back to Form</a>
      </p>
    </div>
  </div>
</div>

</body>
</html>
